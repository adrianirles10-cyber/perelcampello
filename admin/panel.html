<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel — Per El Campello</title>
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpeg" />
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="panel-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/logo.jpeg" alt="Per El Campello" />
      <div>
        <div class="sidebar-brand">Per El Campello</div>
        <div class="sidebar-sub">Panel de publicación</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Contenido</div>
      <button class="nav-item active" id="navEscritos" onclick="showSection('escritos')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/>
        </svg>
        Escritos
      </button>
      <button class="nav-item" id="navPrensa" onclick="showSection('prensa')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a4 4 0 0 1-4 4z"/><line x1="10" y1="7" x2="20" y2="7"/><line x1="10" y1="11" x2="20" y2="11"/><line x1="10" y1="15" x2="20" y2="15"/>
        </svg>
        Notas de prensa
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUser">Conectado</div>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- SECCIÓN ESCRITOS -->
    <div id="sectionEscritos">
      <div class="page-header">
        <div>
          <div class="page-title">Escritos</div>
          <div class="page-subtitle">Artículos y reflexiones publicados</div>
        </div>
        <button class="btn-outline" onclick="showEditor('escritos')">
          + Nuevo escrito
        </button>
      </div>
      <div class="posts-card" id="listEscritos">
        <div class="loading">Cargando...</div>
      </div>
    </div>

    <!-- SECCIÓN NOTAS DE PRENSA -->
    <div id="sectionPrensa" class="hidden">
      <div class="page-header">
        <div>
          <div class="page-title">Notas de prensa</div>
          <div class="page-subtitle">Comunicados oficiales del partido</div>
        </div>
        <button class="btn-outline" onclick="showEditor('prensa')">
          + Nueva nota de prensa
        </button>
      </div>
      <div class="posts-card" id="listPrensa">
        <div class="loading">Cargando...</div>
      </div>
    </div>

    <!-- EDITOR -->
    <div id="sectionEditor" class="hidden">
      <div class="page-header">
        <div>
          <div class="page-title" id="editorTitle">Nuevo escrito</div>
        </div>
        <button class="btn-outline" id="btnBackToList" onclick="backToList()">
          ← Volver al listado
        </button>
      </div>

      <div class="editor-card">
        <form id="postForm">
          <div class="field">
            <label class="editor-label" for="postTitle">Título *</label>
            <input type="text" id="postTitle" placeholder="Escribe el título del artículo..." required />
          </div>

          <div class="form-row">
            <div class="field">
              <label class="editor-label" for="postDate">Fecha de publicación</label>
              <input type="date" id="postDate" />
            </div>
            <div class="field">
              <label class="editor-label" for="postAuthor">Autor</label>
              <input type="text" id="postAuthor" value="Paco Toni" />
            </div>
          </div>

          <div class="field">
            <label class="editor-label" for="postExcerpt">Resumen breve *</label>
            <textarea id="postExcerpt" rows="2" placeholder="Una o dos frases que aparecen en el listado..." required></textarea>
            <div class="field-hint">Este texto es el que se ve en la vista previa de la lista de artículos.</div>
          </div>

          <div class="field">
            <label class="editor-label">Contenido *</label>
            <div class="img-upload-bar">
              <button type="button" class="btn-img-upload" id="btnInsertImage" onclick="document.getElementById('imageInput').click()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                Insertar imagen
              </button>
              <span class="img-upload-hint">JPG, PNG o WEBP · máx. 700 KB</span>
              <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" style="display:none">
            </div>
            <textarea id="postBody"></textarea>
          </div>

          <div class="editor-actions">
            <span class="status-msg" id="publishStatus"></span>
            <button type="button" class="btn-outline" onclick="backToList()">Cancelar</button>
            <button type="submit" class="btn-publish" id="btnPublish">Publicar</button>
          </div>
        </form>
      </div>
    </div>

  </main>

  <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
